<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TK POS - Version 54</title>
    
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/924/924514.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary: #0f172a; --accent: #3b82f6; --bg: #f1f5f9; 
            --card: #ffffff; --text: #334155; --text-dark: #020617; 
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b; 
            --border: #e2e8f0; --muted: #64748b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100dvh; width: 100vw; overflow: hidden; }
        
        .sidebar { width: 80px; background: var(--primary); padding: 15px 10px; color: white; flex-shrink: 0; display: flex; flex-direction: column; z-index: 100; }
        .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; margin: 0 auto 25px; box-shadow: 0 0 15px rgba(59,130,246,0.4); }
        .side-btn { background: transparent; border: none; color: #94a3b8; cursor: pointer; padding: 12px 0; border-radius: 10px; margin-bottom: 8px; font-size: 20px; transition: 0.2s; text-align: center; width: 100%; }
        .side-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }

        .main-content { flex: 1; padding: 15px; display: flex; flex-direction: column; overflow: hidden; height: 100dvh; }
        .section { display: none; flex: 1; flex-direction: column; height: 100%; animation: fadeIn 0.2s ease-out; }
        .section.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .panel { background: var(--card); border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex: 1; }
        .panel-head { padding: 12px 15px; background: white; font-weight: 800; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); text-transform: uppercase; }
        .panel-body { flex: 1; padding: 12px; overflow-y: auto; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; }
        th { position: sticky; top: 0; z-index: 10; background: white; padding: 12px; font-size: 10px; color: var(--muted); text-transform: uppercase; border-bottom: 2px solid var(--bg); box-shadow: inset 0 -1px 0 var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--bg); color: var(--text-dark); vertical-align: middle; }

        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; width: 100%; font-size: 13px; font-family: inherit; color: var(--text-dark); background: white; }
        label { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 4px; display: block; text-transform: uppercase; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; } .btn-accent { background: var(--accent); color: white; } .btn-success { background: var(--success); color: white; } .btn-danger { background: var(--danger); color: white; } 
        .btn-icon { width: 30px; height: 30px; border-radius: 6px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        .pos-grid { display: grid; grid-template-columns: 1fr 280px 320px; gap: 15px; height: 100%; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .menu-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 10px; height: 110px; text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-card h4 { font-size: 12px; font-weight: 800; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .stat-card { background: white; padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
        .highlight-box { background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
        .info-bar { background: #f0fdf4; border-bottom: 1px solid #bbf7d0; padding: 12px 15px; font-size: 12px; color: #15803d; font-weight: 800; display: flex; justify-content: space-between; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 400px; padding: 20px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); max-height: 90vh; }
        .receipt { font-family: 'Space Mono', monospace; color: #1e293b; font-size: 11px; }

        .hidden { display: none !important; } .flex-between { display: flex; justify-content: space-between; align-items: center; } .text-heavy { font-weight: 800; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="logo-icon">TK</div>
    <button class="side-btn active" onclick="UI.nav('pos')">🛒</button>
    <button class="side-btn" onclick="UI.nav('sales')">📊</button>
    <button class="side-btn" onclick="UI.nav('menu')">☕</button>
    <button class="side-btn" onclick="UI.nav('stock')">📦</button>
    <button class="side-btn" onclick="UI.nav('purchases')">🧾</button>
    <button class="side-btn" onclick="UI.nav('bop')">📉</button>
    <div class="mt-auto">
        <button class="side-btn" onclick="DataBackup.export()">💾</button>
        <button class="side-btn" onclick="document.getElementById('import-file').click()">📂</button>
        <input type="file" id="import-file" class="hidden" accept=".json" onchange="DataBackup.import(event)">
    </div>
</nav>

<main class="main-content">
    <section id="pos" class="section active">
        <div class="pos-grid">
            <div class="panel">
                <div class="panel-head"><span>Catalog</span><input type="text" style="width:150px;" placeholder="Search..." oninput="POS.renderMenu(this.value)"></div>
                <div class="panel-body"><div id="pos-menu-grid" class="menu-grid"></div></div>
            </div>
            <div class="panel">
                <div class="panel-head">Order Details</div>
                <div class="panel-body flex-col gap-10">
                    <div class="highlight-box flex-between"><span class="text-xs text-bold">TRX ID</span><span id="pos-trx-id" class="text-sm text-heavy text-accent"></span></div>
                    <label>Customer</label><input type="text" id="pos-cust" placeholder="Guest">
                    <label>Payment</label><select id="pos-method" onchange="POS.togglePayment()"><option value="Cash">Cash</option><option value="QRIS">QRIS</option></select>
                    <div id="box-cash" class="highlight-box" style="background:#f0fdf4;">
                        <label class="text-success">Cash Amount</label><input type="text" id="pos-cash" class="text-lg text-heavy text-success" oninput="Utils.formatInput(this); POS.calc()">
                        <div class="flex-between mt-10 text-sm text-heavy text-success"><span>Change:</span><span id="pos-change">Rp 0</span></div>
                    </div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-head">Cart Summary</div>
                <div class="panel-body p-10" id="pos-cart-list"></div>
                <div class="p-15 highlight-box" style="border-radius:0;">
                    <div class="flex-between text-xl text-heavy mb-15"><span>TOTAL</span><span id="pos-total">Rp 0</span></div>
                    <button id="btn-checkout" class="btn btn-primary w-100" style="height:50px;" onclick="POS.checkout()" disabled>FINALIZE SALES</button>
                </div>
            </div>
        </div>
    </section>

    <section id="sales" class="section">
        <div class="flex-between mb-15">
            <h2 class="text-xl text-heavy">Sales Historical</h2>
            <div class="flex gap-10 bg-white p-10 border-radius-8">
                <input type="date" id="filter-start" class="w-auto">
                <input type="date" id="filter-end" class="w-auto">
                <button class="btn btn-primary btn-sm" onclick="Sales.render()">Filter</button>
                <button class="btn btn-accent btn-sm" onclick="Sales.clearFilter()">Show All</button>
            </div>
        </div>
        <div class="grid gap-15 mb-15" style="grid-template-columns: repeat(5, 1fr);">
            <div class="stat-card"><label>Transactions</label><div id="stat-tx" class="text-lg text-heavy">0</div></div>
            <div class="stat-card"><label>Revenue</label><div id="stat-rev" class="text-lg text-heavy text-success">Rp 0</div></div>
            <div class="stat-card"><label>COGS</label><div id="stat-hpp" class="text-lg text-heavy text-danger">Rp 0</div></div>
            <div class="stat-card"><label>Overhead</label><div id="stat-bop" class="text-lg text-heavy text-warning">Rp 0</div></div>
            <div class="stat-card" style="background:#f0fdf4;"><label>Net Profit</label><div id="stat-profit" class="text-lg text-heavy text-success">Rp 0</div></div>
        </div>
        <div class="panel"><div class="panel-body p-0 scroll-y"><table id="table-sales"></table></div></div>
    </section>

    <section id="menu" class="section">
        <div class="flex-between mb-15"><h2 class="text-xl text-heavy">Menu Configuration</h2><button class="btn btn-primary btn-sm" onclick="Menu.create()">+ New Menu</button></div>
        <div class="grid gap-15 flex-1" style="grid-template-columns: 1fr 320px;">
            <div class="panel">
                <div class="p-15 border-bottom"><select id="menu-select" class="text-bold" onchange="Menu.load()"></select></div>
                <div class="p-15 flex-col flex-1">
                    <div class="flex-between mb-10"><label>Recipe Ingredients</label><button class="btn btn-sm btn-primary" onclick="Menu.addIngredient()">+ Add</button></div>
                    <div class="flex-1 scroll-y bg-white border-radius-8" style="border:1px solid var(--border);">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:50%;">Ingredient</th>
                                    <th class="text-center">Unit</th>
                                    <th style="width:10%;" class="text-center">Qty</th>
                                    <th style="width:10%;" class="text-center">Waste%</th>
                                    <th class="text-right">Cost</th>
                                    <th style="width:40px;"></th>
                                </tr>
                            </thead>
                            <tbody id="recipe-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="panel p-15">
                <label>Menu Name</label><input type="text" id="m-name" class="mb-10">
                <label>Selling Price (Rp)</label><input type="text" id="m-price" class="text-lg text-heavy mb-10" oninput="Utils.formatInput(this); Menu.calcHPP()">
                <label>Sort Order</label><input type="number" id="m-order" value="0" class="mb-10">
                <div class="highlight-box mt-10">
                    <div class="flex-between text-sm text-danger text-bold"><span>Total HPP:</span><span id="m-hpp">Rp 0</span></div>
                </div>
                <button class="btn btn-success w-100 mt-15" style="height:45px;" onclick="Menu.save()">SAVE MENU</button>
                <button class="btn btn-danger w-100 mt-10 btn-sm" onclick="Menu.delete()">DELETE MENU</button>
            </div>
        </div>
    </section>

    <section id="stock" class="section">
        <div class="flex-between mb-15"><h2 class="text-xl text-heavy">Inventory</h2></div>
        <div class="panel mb-15 shrink-0">
            <div class="panel-head">Record Purchase (Inbound)</div>
            <div class="panel-body p-15">
                <div class="grid gap-15" style="grid-template-columns: 6.5fr 1.5fr 1fr 1.5fr auto; align-items: flex-end;">
                    <div><label>Item</label><select id="s-sel" onchange="Stock.handleSelect()"></select><input type="text" id="s-new" class="hidden mt-5" placeholder="New Item Name"></div>
                    <div><label>Format</label><select id="s-type"><option value="weight">Kg -> Gram</option><option value="volume">Ltr -> ml</option><option value="unit">Pcs -> Pcs</option></select></div>
                    <div><label>Qty</label><input type="text" id="s-qty" oninput="Utils.formatInput(this)"></div>
                    <div><label>Total Price</label><input type="text" id="s-price" oninput="Utils.formatInput(this)"></div>
                    <button class="btn btn-primary" onclick="Stock.add()">Record</button>
                </div>
            </div>
        </div>
        <div class="panel flex-1"><div class="panel-body p-0 scroll-y"><table id="table-stock"></table></div></div>
    </section>

    <section id="purchases" class="section">
        <div class="flex-between mb-15"><h2 class="text-xl text-heavy">Expenses History</h2></div>
        <div class="panel"><div class="panel-body p-0 scroll-y"><table id="table-purchases"></table></div></div>
    </section>

    <section id="bop" class="section">
        <div class="flex-between mb-15"><h2 class="text-xl text-heavy">Overhead Historical</h2></div>
        <div class="panel flex-col">
            <div class="info-bar"><span>Daily Overhead Allocation:</span><span id="b-total-val" class="text-md text-heavy">Rp 0</span></div>
            <div class="panel-body p-0 scroll-y"><table id="table-bop"></table></div>
        </div>
    </section>
</main>

<div id="modal-receipt" class="modal"><div class="modal-content"><div id="receipt-area" class="receipt text-center"></div><button class="btn btn-primary w-100 mt-15" onclick="window.print()">PRINT</button><button class="btn btn-danger w-100 mt-10" onclick="UI.hideModal('modal-receipt')">CLOSE</button></div></div>

<script>
const Utils = {
    num: (v) => { if(!v) return 0; return parseFloat(v.toString().replace(/[^0-9.]/g, '')) || 0; },
    fmt: (n) => Math.round(n).toLocaleString('en-US'),
    formatInput: (el) => { if(!el.value) return; let v = el.value.replace(/[^0-9.]/g, ''); let p = v.split('.'); if(p[0]) p[0] = parseInt(p[0], 10).toLocaleString('en-US'); el.value = p.slice(0,2).join('.'); },
    today: () => new Date().toISOString().split('T')[0],
    time: () => new Date().toLocaleTimeString('en-GB'),
    id: () => 'TX-' + Math.floor(Math.random()*900000 + 100000)
};

const DB_KEYS = { stock: 'trk_stock_v16', menus: 'trk_menus_v16', sales: 'trk_sales_v16', bop: 'trk_bop_v16', purchases: 'trk_purchases_v16' };
const Store = {
    state: { stock: [], menus: {}, sales: [], bop: [], purchases: [] },
    load: () => { Object.keys(DB_KEYS).forEach(k => { Store.state[k] = JSON.parse(localStorage.getItem(DB_KEYS[k])) || (k === 'menus' ? {} : []); }); },
    save: () => { Object.keys(DB_KEYS).forEach(k => { localStorage.setItem(DB_KEYS[k], JSON.stringify(Store.state[k])); }); }
};

const UI = {
    nav: (id) => { 
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active')); 
        document.querySelectorAll('.side-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        const btns = document.querySelectorAll('.side-btn');
        const idx = ['pos','sales','menu','stock','purchases','bop'].indexOf(id);
        if(idx > -1) btns[idx].classList.add('active');
        if(id === 'pos') POS.init(); if(id === 'sales') Sales.render(); if(id === 'menu') Menu.init(); if(id === 'stock') Stock.render(); if(id === 'bop') BOP.render(); if(id === 'purchases') Purchases.render();
    },
    showModal: (id) => document.getElementById(id).style.display = 'flex',
    hideModal: (id) => document.getElementById(id).style.display = 'none',
    val: (id, v) => { if(v !== undefined) document.getElementById(id).value = v; return document.getElementById(id).value; },
    text: (id, t) => { if(t !== undefined) document.getElementById(id).innerText = t; }
};

const POS = {
    cart: [],
    init: () => { UI.text('pos-trx-id', Utils.id()); POS.renderMenu(); POS.renderCart(); },
    renderMenu: (filter = '') => {
        let html = '';
        let list = Object.entries(Store.state.menus).sort((a,b) => (a[1].order || 0) - (b[1].order || 0));
        list.forEach(([id, m]) => {
            if(m.name.toLowerCase().includes(filter.toLowerCase())) {
                html += `<div class="menu-card" onclick="POS.add('${id}')"><h4>${m.name}</h4><p class="text-danger text-heavy mb-0">Rp ${Utils.fmt(m.sellPrice)}</p></div>`;
            }
        });
        document.getElementById('pos-menu-grid').innerHTML = html;
    },
    add: (id) => { let ex = POS.cart.find(x => x.id === id); if(ex) ex.qty++; else POS.cart.push({ ...Store.state.menus[id], id, qty: 1 }); POS.renderCart(); },
    update: (i, d) => { POS.cart[i].qty += d; if(POS.cart[i].qty <= 0) POS.cart.splice(i, 1); POS.renderCart(); },
    togglePayment: () => { document.getElementById('box-cash').classList.toggle('hidden', UI.val('pos-method') !== 'Cash'); POS.calc(); },
    calc: () => {
        let total = POS.cart.reduce((s, i) => s + (i.sellPrice * i.qty), 0);
        let cash = Utils.num(UI.val('pos-cash')), method = UI.val('pos-method');
        UI.text('pos-total', `Rp ${Utils.fmt(total)}`);
        UI.text('pos-change', `Rp ${method === 'Cash' && cash >= total ? Utils.fmt(cash - total) : 0}`);
        document.getElementById('btn-checkout').disabled = (total === 0 || (method === 'Cash' && cash < total));
    },
    renderCart: () => {
        let html = '';
        POS.cart.forEach((it, i) => {
            html += `<div class="flex-between mb-10 border-dashed pb-10"><div><div class="text-sm text-bold">${it.name}</div><div class="text-xs">@${Utils.fmt(it.sellPrice)}</div></div><div class="flex gap-10"><button class="btn-icon btn-accent" onclick="POS.update(${i},-1)">-</button><span class="text-bold">${it.qty}</span><button class="btn-icon btn-accent" onclick="POS.update(${i},1)">+</button></div><div class="text-sm text-bold text-right" style="width:70px;">${Utils.fmt(it.sellPrice*it.qty)}</div></div>`;
        });
        document.getElementById('pos-cart-list').innerHTML = html; POS.calc();
    },
    checkout: () => {
        const id = document.getElementById('pos-trx-id').innerText;
        let total = Utils.num(document.getElementById('pos-total').innerText);
        let hpp = 0, agg = Stock.getAgg();
        
        POS.cart.forEach(it => {
            hpp += (it.hpp || 0) * it.qty;
            if(it.ings) it.ings.forEach(ing => {
                if(agg[ing.name]) {
                    let q = ing.qty * it.qty, v = q * agg[ing.name].avgCost;
                    Store.state.stock.push({ id: Date.now()+Math.random(), name: ing.name, type: 'usage', totalBaseUnits: -q, totalVal: -v, useUnit: agg[ing.name].unit });
                }
            });
        });

        let sale = { id, date: Utils.today(), time: Utils.time(), customer: UI.val('pos-cust') || 'Guest', items: [...POS.cart], total, cost: hpp, profit: total - hpp, method: UI.val('pos-method') };
        Store.state.sales.push(sale); Store.save();

        UI.html('receipt-area', `<div class="text-md text-heavy">TEPI KOPI</div><div class="text-xs mb-10 border-bottom pb-10">Sales Receipt</div><div class="flex-between text-xs"><span>ID:</span><span>${sale.id}</span></div><div class="flex-between text-xs mb-10 border-bottom pb-5"><span>Date:</span><span>${sale.date}</span></div><div class="text-left">${POS.cart.map(i => `<div class="flex-between"><span>${i.name} x${i.qty}</span><span>${Utils.fmt(i.sellPrice*i.qty)}</span></div>`).join('')}</div><div class="border-top mt-10 pt-5 text-heavy flex-between"><span>TOTAL</span><span>Rp ${Utils.fmt(sale.total)}</span></div>`);
        UI.showModal('modal-receipt');
        POS.cart = []; UI.val('pos-cust', ''); UI.val('pos-cash', ''); POS.init();
    }
};

const Sales = {
    render: () => {
        let start = UI.val('filter-start'), end = UI.val('filter-end'), raw = Store.state.sales;
        let data = (start && end) ? raw.filter(s => s.date >= start && s.date <= end) : raw;
        let rev=0, cost=0, gProf=0;
        let html = `<thead><tr><th>Date</th><th>TRX ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Profit</th><th class="text-right">Action</th></tr></thead><tbody>`;
        [...data].reverse().forEach(s => { 
            rev += s.total; cost += s.cost; gProf += s.profit; 
            html += `<tr><td>${s.date}<br>${s.time}</td><td class="text-heavy text-accent">${s.id}</td><td>${s.customer}</td><td class="text-xs">${s.items.map(i => `${i.name} x${i.qty}`).join('<br>')}</td><td class="text-bold">Rp ${Utils.fmt(s.total)}</td><td class="text-success text-bold">Rp ${Utils.fmt(s.profit)}</td><td class="text-right"><button class="btn-icon btn-danger" onclick="Sales.del('${s.id}')">🗑️</button></td></tr>`; 
        });
        document.getElementById('table-sales').innerHTML = html + '</tbody>';
        let days = new Set(data.map(s => s.date)).size || 1, bop = BOP.render() * days;
        UI.text('stat-tx', data.length); UI.text('stat-rev', `Rp ${Utils.fmt(rev)}`); UI.text('stat-hpp', `Rp ${Utils.fmt(cost)}`); UI.text('stat-bop', `Rp ${Utils.fmt(bop)}`); UI.text('stat-profit', `Rp ${Utils.fmt(gProf - bop)}`);
    },
    clearFilter: () => { UI.val('filter-start', ''); UI.val('filter-end', ''); Sales.render(); },
    del: (id) => {
        if(!confirm("DELETE PERMANENTLY?")) return;
        Store.state.sales = Store.state.sales.filter(s => s.id !== id);
        Store.save();
        Sales.render();
    }
};

const Menu = {
    activeId: null,
    init: () => { let sel = document.getElementById('menu-select'); sel.innerHTML = '<option value="">-- Select Menu --</option><option value="new">+ NEW MENU</option>'; Object.entries(Store.state.menus).forEach(([k,m]) => sel.add(new Option(m.name, k))); },
    load: () => {
        let v = UI.val('menu-select'); if(v === 'new') { Menu.activeId = 'm_'+Date.now(); Store.state.menus[Menu.activeId] = {name:'', sellPrice:0, ings:[], order:0}; Menu.init(); UI.val('menu-select', Menu.activeId); } else Menu.activeId = v;
        let m = Store.state.menus[Menu.activeId]; if(!m) return;
        UI.val('m-name', m.name); UI.val('m-price', Utils.fmt(m.sellPrice)); UI.val('m-order', m.order || 0);
        document.getElementById('recipe-list').innerHTML = ''; (m.ings || []).forEach(i => Menu.addIngredient(i)); Menu.calcHPP();
    },
    create: () => { UI.val('menu-select', 'new'); Menu.load(); },
    addIngredient: (data = {name:'', qty:0, waste:0}) => {
        let agg = Stock.getAgg(), tr = document.createElement('tr'); tr.className = 'ing-row';
        let opts = `<option value="">Select...</option>` + Object.keys(agg).map(k => `<option value="${k}" ${data.name===k?'selected':''}>${k}</option>`).join('');
        tr.innerHTML = `<td class="p-5"><select class="i-name mb-0" onchange="Menu.updateUnit(this); Menu.calcHPP()">${opts}</select></td><td class="text-xs text-center i-unit">${data.name && agg[data.name] ? agg[data.name].unit : '-'}</td><td class="p-5 text-center"><input type="text" class="i-qty text-center mb-0" style="padding:5px;" value="${data.qty||''}" oninput="Menu.calcHPP()"></td><td class="p-5 text-center"><input type="text" class="i-waste text-center mb-0" style="padding:5px;" value="${data.waste||''}" oninput="Menu.calcHPP()"></td><td class="text-right text-bold i-cost">0</td><td class="text-center"><button class="btn-icon text-danger" onclick="this.closest('tr').remove(); Menu.calcHPP()">✕</button></td>`;
        document.getElementById('recipe-list').appendChild(tr); if(data.name) Menu.calcHPP();
    },
    updateUnit: (sel) => { let u = Stock.getAgg()[sel.value]?.unit || '-'; sel.closest('tr').querySelector('.i-unit').innerText = u; },
    calcHPP: () => {
        let agg = Stock.getAgg(), tot = 0;
        document.querySelectorAll('.ing-row').forEach(r => {
            let n = r.querySelector('.i-name').value, q = Utils.num(r.querySelector('.i-qty').value), w = Utils.num(r.querySelector('.i-waste').value);
            if(n && agg[n]) { let c = (q * agg[n].avgCost) * (1 + (w/100)); r.querySelector('.i-cost').innerText = Utils.fmt(c); tot += c; }
        });
        UI.text('m-hpp', `Rp ${Utils.fmt(tot)}`); return tot;
    },
    save: () => {
        if(!Menu.activeId) return;
        let ings = Array.from(document.querySelectorAll('.ing-row')).map(r => ({ name: r.querySelector('.i-name').value, qty: Utils.num(r.querySelector('.i-qty').value), waste: Utils.num(r.querySelector('.i-waste').value) })).filter(i => i.name);
        Store.state.menus[Menu.activeId] = { name: UI.val('m-name'), sellPrice: Utils.num(UI.val('m-price')), order: parseInt(UI.val('m-order')), ings, hpp: Utils.num(document.getElementById('m-hpp').innerText) };
        Store.save(); alert('Menu Saved!'); Menu.init();
    },
    delete: () => { if(confirm('Delete?')) { delete Store.state.menus[Menu.activeId]; Store.save(); location.reload(); } }
};

const Stock = {
    getAgg: () => { 
        let agg = {}; 
        Store.state.stock.forEach(l => { 
            if(!agg[l.name]) agg[l.name] = { base: 0, val: 0, unit: l.useUnit }; 
            agg[l.name].base += l.totalBaseUnits; agg[l.name].val += l.totalVal; 
        }); 
        Object.keys(agg).forEach(k => agg[k].avgCost = agg[k].base !== 0 ? Math.abs(agg[k].val / agg[k].base) : 0); 
        return agg; 
    },
    render: () => {
        let agg = Stock.getAgg(), sel = document.getElementById('s-sel');
        sel.innerHTML = '<option value="">-- Select Item --</option><option value="new">+ NEW ITEM</option>';
        Object.keys(agg).forEach(k => sel.add(new Option(k,k)));
        let html = `<thead><tr><th>Item</th><th>Stock</th><th>Avg Cost</th><th>Value</th><th class="text-right">Action</th></tr></thead><tbody>`;
        Object.entries(agg).forEach(([k, v]) => { html += `<tr><td class="text-bold">${k}</td><td>${Utils.fmt(v.base)} ${v.unit}</td><td>Rp ${v.avgCost.toFixed(2)}</td><td>Rp ${Utils.fmt(v.val)}</td><td class="text-right">...</td></tr>`; });
        document.getElementById('table-stock').innerHTML = html + '</tbody>';
    },
    handleSelect: () => { document.getElementById('s-new').classList.toggle('hidden', UI.val('s-sel') !== 'new'); },
    add: () => {
        let v = UI.val('s-sel'), name = v === 'new' ? UI.val('s-new') : v, qty = Utils.num(UI.val('s-qty')), price = Utils.num(UI.val('s-price')), type = UI.val('s-type');
        if(!name || !qty || !price) return alert("Fill fields");
        let f = (type === 'unit') ? 1 : 1000;
        Store.state.stock.push({ id: Date.now(), name, type, totalBaseUnits: qty * f, totalVal: price, useUnit: (type==='weight'?'Gram':type==='volume'?'ml':'Pcs') });
        Store.save(); UI.val('s-qty',''); UI.val('s-price',''); Stock.render();
    }
};

const Purchases = { render: () => { let html = `<thead><tr><th>Date</th><th>Description</th><th>Cost</th></tr></thead><tbody>`; Store.state.purchases.forEach(p => { html += `<tr><td>${p.date}</td><td>${p.name}</td><td>Rp ${Utils.fmt(p.cost)}</td></tr>`; }); document.getElementById('table-purchases').innerHTML = html + '</tbody>'; } };
const BOP = { render: () => { let html = `<thead><tr><th>Item</th><th>Daily Cost</th></tr></thead><tbody>`; let tot = 0; Store.state.bop.forEach(b => { tot += b.daily; html += `<tr><td>${b.name}</td><td>Rp ${Utils.fmt(b.daily)}</td></tr>`; }); document.getElementById('table-bop').innerHTML = html + '</tbody>'; UI.text('b-total-val', `Rp ${Utils.fmt(tot)}`); return tot; } };

const DataBackup = {
    export: () => { let b = new Blob([JSON.stringify(Store.state)], {type:"application/json"}); let a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `TK_Backup.json`; a.click(); },
    import: (e) => { let f = e.target.files[0]; if(!f) return; let r = new FileReader(); r.onload = (evt) => { Store.state = JSON.parse(evt.target.result); Store.save(); location.reload(); }; r.readAsText(f); }
};

Store.load(); UI.nav('pos');
</script>
</body>
</html>
